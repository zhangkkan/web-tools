<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>提取 JSON Path</title>
<link href="../assets/dist/global.css" rel="stylesheet" type="text/css"/>
<style>
    .wrapper { max-width: 1180px; }
    .editor,
    .result {
        width: 100%;
        height: 320px;
        font: normal 13px/1.5 Consolas, Monaco, monospace;
    }
    .result { height: 380px; }
    .toolbar .btn,
    .toolbar .btn-secondary { min-width: 120px; }
    .error-box {
        min-height: 24px;
        color: #c00;
        font-weight: bold;
    }
    .tool-check {
        display: inline-block;
        margin-right: 12px;
        vertical-align: middle;
        color: #333;
        font-size: 13px;
    }
</style>
<script src="main.js"></script>
</head>
<body onload="initJsonPathTool()">
<div class="wrapper mx-auto">
    <div class="panel-a form-a">
        <p class="mb-2"><strong>JSON Path 提取工具</strong></p>
        <p class="mb-2 text-muted">输入 JSON，点击提取后在下方获得全部 JSON Path（每行一个）。</p>

        <p class="mb-1"><strong>JSON 输入</strong></p>
        <textarea id="jsonInput" class="editor mb-1"></textarea>
        <p id="errorMsg" class="error-box mb-2"></p>

        <p class="toolbar mb-2">
            <input class="btn mr-2" type="button" value="提取 Path" onclick="extractPaths()">
            <input class="btn-secondary mr-2" type="button" value="格式化 JSON" onclick="formatJsonInput()">
            <input class="btn-secondary" type="button" value="清空" onclick="clearAll()">
        </p>

        <p class="mb-2">
            <label class="tool-check">
                <input id="leafOnly" type="checkbox" onchange="extractPaths()">
                仅输出叶子节点路径
            </label>
            <span id="countLabel" class="text-muted">共 0 条路径</span>
        </p>

        <p class="mb-1"><strong>JSON Path 输出</strong></p>
        <textarea id="pathOutput" class="result" readonly></textarea>
    </div>
</div>
</body>
</html>
